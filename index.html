<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAYASH // HUNTR/X BIRTHDAY TOUR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
            rajdhani: ['Rajdhani', 'sans-serif'],
          },
          colors: {
            'huntr-purple': '#7c3aed',
            'huntr-pink': '#f472b6',
            'huntr-blue': '#38bdf8',
            'deep-stage': '#0f0720',
            'neon-glow': '#a855f7',
          },
          backgroundImage: {
            'stage-gradient': 'linear-gradient(180deg, #2e1065 0%, #0f0720 100%)',
            'card-gradient': 'linear-gradient(135deg, rgba(124, 58, 237, 0.2) 0%, rgba(244, 114, 182, 0.2) 100%)',
          },
          animation: {
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'spotlight': 'spotlight 4s ease-in-out infinite alternate',
          },
          keyframes: {
            spotlight: {
              '0%': { opacity: '0.3', transform: 'rotate(-5deg)' },
              '100%': { opacity: '0.6', transform: 'rotate(5deg)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #0f0720;
      color: white;
      overflow-x: hidden;
    }

    .glass-panel {
      background: rgba(46, 16, 101, 0.4);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .text-glow {
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5), 0 0 20px rgba(124, 58, 237, 0.3);
    }

    .clip-diagonal {
      clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
